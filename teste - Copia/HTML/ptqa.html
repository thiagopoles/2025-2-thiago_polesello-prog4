<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Estatísticas da Colmeia</title>

    <link rel="stylesheet" href="../CSS/ptqa.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <h2 class="titulo">-ESTATÍSTICAS DA COLMEIA-</h2>

    <div class="container">

        <div class="form-box">

            <label>Tipo de gráfico:</label>
            <select id="selecionarGrafico">
                <option value="">Selecione...</option>
                <option value="temperatura">Temperatura</option>
                <option value="aqi4">AQI ≥ 4</option>
                <option value="umidade70">Umidade > 70%</option>
                <option value="co2">CO₂ > 1000 ppm</option>
                <option value="pressao">Pressão < 1000 hPa</option>
                <option value="gases">Gases > 200 ppb</option>
            </select>

            <label>Data inicial:</label>
            <input type="date" id="dataInicial">

            <label>Data final:</label>
            <input type="date" id="dataFinal">

            <button id="btnPesquisar">Pesquisar</button>

        </div>

    </div>

    <div class="graficoArea">
        <canvas id="grafico"></canvas>
    </div>

    <script src="../JS/graficosPTQA/loaderPTQA.js"></script>

</body>
</html>
